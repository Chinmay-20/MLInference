name: ML & HPC CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # -------------------- JOB 1: Python Quality & Testing --------------------
  python-test-and-export:
    runs-on: ubuntu-latest
    steps:
      - name: Code Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest flake8 onnx

      - name: Linting with flake8
        run: |
          flake8 ml_src tests --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Execute unit tests
        run: |
          pytest tests/

      - name: Test ONNX export specifically
        run: |
          pytest tests/test_onnx_export.py -v

      - name: Export model for C++ job
        run: |
          python ml_src/export_onnx.py

      - name: Upload ONNX model artifact
        uses: actions/upload-artifact@v4
        with:
          name: exported-model
          path: models

  # -------------------- JOB 2: Build C++ Inference Engine --------------------
  cpp-build-check:
    needs: python-test-and-export
    runs-on: ubuntu-latest
    steps:
      - name: Code Checkout
        uses: actions/checkout@v3

      - name: Download ONNX model
        uses: actions/download-artifact@v4
        with:
          name: exported-model
          path: models
      
      - name: Place model in expected path
        run: |
          mkdir -p cpp_inference/../../models
          cp models/model.onnx cpp_inference/../../models/
          cp models/model.onnx.data cpp_inference/../../models/


      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ libyaml-cpp-dev wget tar

      - name: Download and setup ONNX Runtime (Linux)
        run: |
          wget https://github.com/microsoft/onnxruntime/releases/download/v1.24.1/onnxruntime-linux-x64-1.24.1.tgz
          tar -xvzf onnxruntime-linux-x64-1.24.1.tgz
          export ONNXRUNTIME_HOME=$PWD/onnxruntime-linux-x64-1.24.1
          echo "ONNXRUNTIME_HOME=$PWD/onnxruntime-linux-x64-1.24.1" >> $GITHUB_ENV

      - name: Configure CMake
        run: |
          mkdir -p cpp_inference/build
          cd cpp_inference/build
          cmake .. -DONNXRUNTIME_DIR=$ONNXRUNTIME_HOME

      - name: Build C++ inference
        run: |
          cd cpp_inference/build
          make -j$(nproc)

      - name: Run C++ inference test
        run: |
          cd cpp_inference/build
          ./onnx_inference